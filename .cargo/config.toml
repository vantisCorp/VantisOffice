[build]
target-dir = "target"

[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
debug = false
lto = true
codegen-units = 1
strip = true

[profile.test]
opt-level = 1
debug = true

[profile.bench]
opt-level = 3
debug = false
lto = true
codegen-units = 1

# Test configuration
[target.'cfg(all(target_os = "linux", target_arch = "x86_64"))']
rustflags = ["-C", "target-cpu=native"]

[target.'cfg(all(target_os = "macos", target_arch = "x86_64"))']
rustflags = ["-C", "target-cpu=haswell"]

[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))']
rustflags = ["-C", "target-cpu=apple-m1"]

[target.'cfg(all(target_os = "windows", target_arch = "x86_64"))']
rustflags = ["-C", "target-cpu=haswell"]